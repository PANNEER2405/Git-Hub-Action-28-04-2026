<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Node.js App</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>My Node.js App</h1>
    <p id="deploy-info">Loading deployment info...</p>
  </header>

  <main>

    <!-- Login Section -->
    <div class="card">
      <h2>Login</h2>
      <input type="text" id="username" placeholder="Enter Username" />
      <input type="password" id="password" placeholder="Enter Password" />
      <button onclick="login()">Login</button>
      <p id="login-status"></p>
    </div>

    <!-- Server Status -->
    <div class="card">
      <h2>Server Status</h2>
      <div id="status" class="status-badge">Checking...</div>
    </div>

    <!-- API Test -->
    <div class="card">
      <h2>API Test</h2>
      <button id="fetch-btn" onclick="fetchData()">Fetch Data</button>
      <pre id="api-result"></pre>
    </div>

  </main>

  <script>
    // Deployment info
    fetch('/api/info')
      .then(r => r.json())
      .then(d => {
        document.getElementById('deploy-info').textContent =
          `Deployed: ${d.deployedAt} | Version: ${d.version}`;
        document.getElementById('status').textContent = 'Online';
        document.getElementById('status').classList.add('online');
      })
      .catch(() => {
        document.getElementById('status').textContent = 'Offline';
      });

    // API Test
    function fetchData() {
      fetch('/api/data')
        .then(r => r.json())
        .then(d => {
          document.getElementById('api-result').textContent =
            JSON.stringify(d, null, 2);
        });
    }

    // Login API
    function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      fetch('/api/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ username, password })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById('login-status').textContent = data.message;
      })
      .catch(() => {
        document.getElementById('login-status').textContent = "Error connecting to server";
      });
    }
  </script>
</body>
</html>
