name: Build and Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build on GitHub Runner & Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install deps
      - name: Install Dependencies
        run: npm install

      # 4. Test
      - name: Run Tests
        run: npm test

      # 5. Build
      - name: Build Application
        run: npm run build
        env:
          NODE_ENV: production

      # 6. Package
      - name: Create Deployment Package
        run: |
          tar -czf /tmp/deployment.tar.gz --exclude='.git' --exclude='node_modules' --exclude='.github' --exclude='*.test.js' .
          mv /tmp/deployment.tar.gz ./deployment.tar.gz
          ls -lh deployment.tar.gz

      # 7. SCP to EC2
      - name: Copy Files to EC2
        uses: appleboy/scp-action@master
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          source:   'deployment.tar.gz,scripts/deploy.sh'
          target:   '/home/${{ secrets.EC2_USER }}/deployments'

      # 8. Deploy
      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          APP_VERSION: ${{ github.sha }}
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          envs: DB_HOST,DB_USER,DB_PASSWORD,DB_NAME,APP_VERSION
          script: |
            cd /home/${{ secrets.EC2_USER }}/deployments
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh

      # 🔥 9. Email on SUCCESS
      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "✅ Deployment Success"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_USER }}
          body: |
            Deployment completed successfully 🚀
            Repo: ${{ github.repository }}
            Commit: ${{ github.sha }}

      # 🔥 10. Email on FAILURE
      - name: Send Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "❌ Deployment Failed"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_USER }}
          body: |
            Deployment failed ❌
            Repo: ${{ github.repository }}
            Check logs: https://github.com/${{ github.repository }}/actions
