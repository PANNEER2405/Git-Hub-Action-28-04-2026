name: My First Workflow

on:
  push:
    branches: [main]

jobs:
  runscripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Python code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Run Python Script
        run: python hello.py
