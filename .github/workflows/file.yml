name: My First Workflows

on:
  push:
    branches:
      - main
  schedule:
    - cron: "45 21 28 4 2"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - run: echo "Building app..."

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploying..."
