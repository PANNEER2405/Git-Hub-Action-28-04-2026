name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:

  # ---------------------------
  # JOB 1: TEST
  # ---------------------------
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test


  # ---------------------------
  # JOB 2: BUILD
  # ---------------------------
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: dist/


  # ---------------------------
  # JOB 3: DEPLOY
  # ---------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: dist/

      - name: Verify Build Files
        run: ls -la dist/

      - name: Deploy (Simulated)
        run: |
          echo "🚀 Deploying application..."
          echo "App files:"
          ls dist/
